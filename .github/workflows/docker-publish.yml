name: Build and Publish Docker Image

# Trigger the workflow on pushes to the main branch
on:
  push:
    branches: [ "main" ]

# Define environment variables
env:
  REGISTRY: ghcr.io
  # This uses your repository name in lowercase as the image name
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Crucial for pushing to GHCR

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up QEMU for multi-architecture builds if needed later
      - name: Set up Docker Buildx
        uses: actions/setup-buildx-action@v3

      # Log into the GitHub Container Registry
      - name: Log in to the Container Registry
        uses: actions/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract metadata (tags, labels) for Docker
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Tags the image with 'latest' and the git commit SHA
          tags: |
            type=raw,value=latest
            type=sha

      # Build and push the Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ id.meta.outputs.tags }}
          labels: ${{ id.meta.outputs.labels }}
          # Leverages GitHub Actions cache to speed up subsequent builds
          cache-from: type=gha
          cache-to: type=gha,mode=max